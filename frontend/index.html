<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RevRate - Predykcja ceny samochodu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 640px;
      width: 100%;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    select, input[type="number"], input[type="text"] {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.65rem 0.85rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus, input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.25);
    }
    select:invalid,
    select option[value=""] {
      color: #64748b;
    }
    select option:not([value=""]) {
      color: #e2e8f0;
    }
    input::placeholder {
      color: #475569;
    }
    input.error, select.error {
      border-color: #f87171;
      box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.25);
    }
    .error-msg {
      color: #f87171;
      font-size: 0.75rem;
      margin-top: 0.25rem;
      min-height: 1rem;
    }
    .btn-row {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
    }
    button {
      flex: 1;
      padding: 0.85rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-predict {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #0f172a;
    }
    .btn-reset {
      background: #334155;
      color: #e2e8f0;
    }
    .result-box {
      margin-top: 1.5rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      display: none;
    }
    .result-box.success {
      border-color: #22c55e;
      display: block;
    }
    .result-box.error {
      border-color: #f87171;
      display: block;
    }
    .result-label {
      font-size: 0.85rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .result-price {
      font-size: 2.5rem;
      font-weight: 800;
      margin-top: 0.25rem;
    }
    .result-box.success .result-price {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .result-box.error .result-price {
      color: #f87171;
      font-size: 1rem;
      font-weight: 600;
    }
    .spinner {
      display: inline-block;
      width: 1rem; height: 1rem;
      border: 2px solid #0f172a;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>RevRate</h1>
    <p class="subtitle">Sprawdz przewidywana cene samochodu</p>

    <form id="carForm" novalidate>
      <div class="form-grid">

        <div class="form-group">
          <label for="Vehicle_brand">Marka *</label>
          <select id="Vehicle_brand" required>
            <option value="">Wybierz marke</option>
          </select>
          <div class="error-msg" id="err_Vehicle_brand"></div>
        </div>

        <div class="form-group">
          <label for="Vehicle_model">Model *</label>
          <select id="Vehicle_model" required disabled>
            <option value="">Najpierw wybierz marke</option>
          </select>
          <div class="error-msg" id="err_Vehicle_model"></div>
        </div>

        <div class="form-group">
          <label for="Type">Typ nadwozia *</label>
          <select id="Type" required disabled>
            <option value="">Najpierw wybierz model</option>
          </select>
          <div class="error-msg" id="err_Type"></div>
        </div>

        <div class="form-group">
          <label for="Production_year">Rok produkcji *</label>
          <select id="Production_year" required>
            <option value="">Wybierz rok</option>
          </select>
          <div class="error-msg" id="err_Production_year"></div>
        </div>

        <div class="form-group">
          <label for="Power_HP">Moc (KM) *</label>
          <input type="number" id="Power_HP" placeholder="np. 150" min="1" step="1" required />
          <div class="error-msg" id="err_Power_HP"></div>
        </div>

        <div class="form-group">
          <label for="Mileage_km">Przebieg (km) *</label>
          <input type="number" id="Mileage_km" placeholder="np. 120000" min="0" step="1" required />
          <div class="error-msg" id="err_Mileage_km"></div>
        </div>

        <div class="form-group">
          <label for="Displacement_cm3">Pojemnosc (cm3) *</label>
          <input type="number" id="Displacement_cm3" placeholder="np. 2000" min="1" step="1" required />
          <div class="error-msg" id="err_Displacement_cm3"></div>
        </div>

        <div class="form-group">
          <label for="Doors_number">Liczba drzwi *</label>
          <select id="Doors_number" required>
            <option value="">Wybierz</option>
          </select>
          <div class="error-msg" id="err_Doors_number"></div>
        </div>

        <div class="form-group">
          <label for="Transmission">Skrzynia biegow *</label>
          <select id="Transmission" required>
            <option value="">Wybierz</option>
          </select>
          <div class="error-msg" id="err_Transmission"></div>
        </div>

        <div class="form-group">
          <label for="Fuel_type">Typ paliwa *</label>
          <select id="Fuel_type" required>
            <option value="">Wybierz</option>
          </select>
          <div class="error-msg" id="err_Fuel_type"></div>
        </div>

        <div class="form-group">
          <label for="Drive">Naped *</label>
          <select id="Drive" required>
            <option value="">Wybierz</option>
          </select>
          <div class="error-msg" id="err_Drive"></div>
        </div>

        <div class="form-group">
          <label for="Colour">Kolor *</label>
          <select id="Colour" required>
            <option value="">Wybierz</option>
          </select>
          <div class="error-msg" id="err_Colour"></div>
        </div>

        <div class="form-group full-width">
          <label for="Condition">Stan *</label>
          <select id="Condition" required>
            <option value="">Uzywany czy nowy?</option>
          </select>
          <div class="error-msg" id="err_Condition"></div>
        </div>

      </div>

      <div class="btn-row">
        <button type="submit" class="btn-predict" id="predictBtn">Przewidz cene</button>
        <button type="button" class="btn-reset" id="resetBtn">Wyczysc</button>
      </div>
    </form>

    <div class="result-box" id="resultBox">
      <div class="result-label">Szacowana cena</div>
      <div class="result-price" id="resultPrice"></div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let optionsData = null;

    const $ = id => document.getElementById(id);

    function clearError(name) {
      const el = $(name);
      const err = $('err_' + name);
      if (el) el.classList.remove('error');
      if (err) err.textContent = '';
    }

    function setError(name, msg) {
      const el = $(name);
      const err = $('err_' + name);
      if (el) el.classList.add('error');
      if (err) err.textContent = msg;
    }

    function populateSelect(id, items, placeholder) {
      const sel = $(id);
      const current = sel.value;
      sel.innerHTML = '<option value="">' + placeholder + '</option>';
      items.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item;
        opt.textContent = item;
        sel.appendChild(opt);
      });
      if (items.includes(current)) sel.value = current;
    }

    async function loadOptions() {
      try {
        const res = await fetch(API + '/car-options');
        optionsData = await res.json();

        const brands = Object.keys(optionsData.hierarchy).sort();
        populateSelect('Vehicle_brand', brands, 'Wybierz marke');

        populateSelect('Transmission', optionsData.transmissions, 'Wybierz');
        populateSelect('Fuel_type', optionsData.fuel_types, 'Wybierz');
        populateSelect('Drive', optionsData.drives, 'Wybierz');
        populateSelect('Colour', optionsData.colours, 'Wybierz');

        const doorsOpts = optionsData.doors_numbers.map(String);
        populateSelect('Doors_number', doorsOpts, 'Wybierz');

        const conditionsRaw = optionsData.conditions;
        const l2r = optionsData.labels_to_raw || {};
        populateSelect('Condition', conditionsRaw, 'Uzywany czy nowy?');

        const yearSel = $('Production_year');
        yearSel.innerHTML = '<option value="">Wybierz rok</option>';
        for (let y = 2026; y >= 1990; y--) {
          const opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          yearSel.appendChild(opt);
        }
      } catch (e) {
        console.error('Nie udalo sie zaladowac opcji:', e);
      }
    }

    function getRaw(label) {
      if (optionsData && optionsData.labels_to_raw) {
        return optionsData.labels_to_raw[label] || label;
      }
      return label;
    }

    function updateModels() {
      const brand = $('Vehicle_brand').value;
      const modelSel = $('Vehicle_model');
      const typeSel = $('Type');

      typeSel.innerHTML = '<option value="">Najpierw wybierz model</option>';
      typeSel.disabled = true;

      if (!brand || !optionsData.hierarchy[brand]) {
        modelSel.innerHTML = '<option value="">Najpierw wybierz marke</option>';
        modelSel.disabled = true;
        return;
      }

      const models = Object.keys(optionsData.hierarchy[brand]).sort();
      populateSelect('Vehicle_model', models, 'Wybierz model');
      modelSel.disabled = false;
      clearError('Vehicle_brand');
    }

    function updateTypes() {
      const brand = $('Vehicle_brand').value;
      const model = $('Vehicle_model').value;
      const typeSel = $('Type');

      if (!brand || !model || !optionsData.hierarchy[brand] || !optionsData.hierarchy[brand][model]) {
        typeSel.innerHTML = '<option value="">Najpierw wybierz model</option>';
        typeSel.disabled = true;
        return;
      }

      const types = optionsData.hierarchy[brand][model].sort();
      populateSelect('Type', types, 'Wybierz typ');
      typeSel.disabled = false;
      clearError('Vehicle_model');
    }

    $('Vehicle_brand').addEventListener('change', updateModels);
    $('Vehicle_model').addEventListener('change', updateTypes);

    document.querySelectorAll('select[required]').forEach(sel => {
      sel.addEventListener('change', () => {
        if (sel.value) clearError(sel.id);
      });
    });

    document.querySelectorAll('input[type="number"]').forEach(inp => {
      inp.addEventListener('input', () => {
        let v = inp.value.replace(/\s/g, '');
        inp.value = v;
        if (v && !isNaN(v) && Number(v) >= 0) clearError(inp.id);
      });
    });

    function validate() {
      let valid = true;
      const required = [
        'Vehicle_brand', 'Vehicle_model', 'Type',
        'Production_year', 'Power_HP', 'Mileage_km',
        'Displacement_cm3', 'Doors_number', 'Transmission',
        'Fuel_type', 'Drive', 'Colour', 'Condition'
      ];

      required.forEach(name => {
        const el = $(name);
        if (!el.value) {
          setError(name, 'Wymagane');
          valid = false;
        } else {
          clearError(name);
        }
      });

      ['Power_HP', 'Mileage_km', 'Displacement_cm3'].forEach(name => {
        const v = $(name).value.replace(/\s/g, '');
        if (v && (isNaN(v) || Number(v) < 0)) {
          setError(name, 'Podaj prawidlowa liczbe');
          valid = false;
        }
      });

      if ($('Power_HP').value && Number($('Power_HP').value) <= 0) {
        setError('Power_HP', 'Moc musi byc wieksza niz 0');
        valid = false;
      }
      if ($('Displacement_cm3').value && Number($('Displacement_cm3').value) <= 0) {
        setError('Displacement_cm3', 'Pojemnosc musi byc wieksza niz 0');
        valid = false;
      }

      return valid;
    }

    $('carForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      const btn = $('predictBtn');
      const resultBox = $('resultBox');
      const resultPrice = $('resultPrice');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Obliczam...';
      resultBox.className = 'result-box';
      resultBox.style.display = 'none';

      const payload = {
        Production_year: parseInt($('Production_year').value),
        Power_HP: parseFloat($('Power_HP').value),
        Mileage_km: parseFloat($('Mileage_km').value),
        Displacement_cm3: parseFloat($('Displacement_cm3').value),
        Doors_number: parseInt($('Doors_number').value),
        Transmission: $('Transmission').value,
        Vehicle_model: $('Vehicle_model').value,
        Vehicle_brand: $('Vehicle_brand').value,
        Type: getRaw($('Type').value),
        Drive: getRaw($('Drive').value),
        Colour: getRaw($('Colour').value),
        Fuel_type: getRaw($('Fuel_type').value),
        Condition: getRaw($('Condition').value),
      };

      try {
        const res = await fetch(API + '/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Blad serwera');
        }

        const data = await res.json();
        resultPrice.textContent = data.price_formatted;
        resultBox.className = 'result-box success';
      } catch (err) {
        resultPrice.textContent = err.message || 'Nie udalo sie uzyskac predykcji';
        resultBox.className = 'result-box error';
      } finally {
        resultBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Przewidz cene';
      }
    });

    $('resetBtn').addEventListener('click', () => {
      $('carForm').reset();
      $('Vehicle_model').innerHTML = '<option value="">Najpierw wybierz marke</option>';
      $('Vehicle_model').disabled = true;
      $('Type').innerHTML = '<option value="">Najpierw wybierz model</option>';
      $('Type').disabled = true;
      $('resultBox').style.display = 'none';
      $('resultBox').className = 'result-box';
      document.querySelectorAll('.error-msg').forEach(el => el.textContent = '');
      document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
    });

    loadOptions();
  </script>
</body>
</html>
